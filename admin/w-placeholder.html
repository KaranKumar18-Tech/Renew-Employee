const navEl = document.getElementById('sidebarNav');
NAV_ITEMS.forEach(item => {
  const isActive = item.key === pageKey || (item.key === 'analytics' && pageKey === 'analytics');
  const a = document.createElement('a');
  a.href = item.href;
  a.className = 'nav-link' + (isActive ? ' active' : '');
  a.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${item.icon}</svg>${item.label}`;
  navEl.appendChild(a);
});

if (data) {
  document.getElementById('pageIcon').textContent = data.icon;
  document.getElementById('pageTitle').textContent = data.title;
  document.getElementById('pageDesc').textContent = data.desc;
  document.getElementById('pageIdBadge').textContent = data.icon + ' ' + data.title;
  document.title = data.title + ' — Admin — ReNew Leaders Connect 2026';

  // Feature grid
  const fg = document.getElementById('featureGrid');
  data.features.forEach(f => {
    const div = document.createElement('div');
    div.className = 'feature-card';
    div.innerHTML = `<div class="feature-icon">${f.icon}</div><div class="feature-title">${f.title}</div><div class="feature-desc">${f.desc}</div>`;
    fg.appendChild(div);
  });

  // Wire preview
  document.getElementById('wirePreview').innerHTML = WIRE_TEMPLATES[data.wire] || '';
}

/* ── TOAST ── */
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('webToast');
  t.textContent = msg;
  if (toastTimer) clearTimeout(toastTimer);
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
