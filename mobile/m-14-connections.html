    .iphone-frame {

    .screen-scroll {

      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .screen-scroll::-webkit-scrollbar {

    .top-nav {

      gap: 6px;

      border: 1px solid rgba(255,255,255,0.25);

    .search-bar {

    .filter-chips {

      margin-top: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;

      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      border: 1px solid #C8E6C9;
      background: #FFFFFF;
      color: #1B5E20;

    }

    .chip:hover {

    .stats-banner {

      margin: 0 16px;

      align-items: center;

    .stat-number {

      color: #1B5E20;

    .stat-label {

    .stat-divider {

    /* Modal */
    .modal-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.open {
      display: block;
      opacity: 1;
    }

    .modal-bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #FFFFFF;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      z-index: 101;
      transition: transform 0.3s ease;
      transform: translateY(100%);
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-bottom-sheet.open {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #E0E0E0;
      border-radius: 2px;
      margin: 0 auto 16px;

    .modal-avatar {

      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: #FFFFFF;

    .modal-name {
      font-size: 16px;
      font-weight: 700;
      color: #1A1A1A;
      text-align: center;

    .modal-role {
      font-size: 12px;

      color: #616161;
      text-align: center;
      margin-top: 4px;

    .modal-divider {
      height: 1px;
      background: #E0E0E0;
      margin: 12px 0 16px;
    }

    .modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .modal-btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-btn-primary {
      background: #1B5E20;
      color: #FFFFFF;
    }

    .modal-btn-primary:hover {
      background: #0d4611;
    }

    .modal-btn-secondary {
      background: #FFFFFF;
      border: 1.5px solid #1B5E20;
      color: #1B5E20;
    }

    .modal-btn-secondary:hover {
      background: #F5F9F5;
    }

    .modal-btn-tertiary {
      background: #F5F9F5;
      color: #616161;
    }

    .modal-btn-tertiary:hover {
      background: #E8F5E9;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: #9E9E9E;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .toast {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A;
      color: #FFFFFF;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      z-index: 200;
      animation: slideUp 0.2s ease-out forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .screen-label {
      margin-top: 16px;
      font-size: 13px;
      font-weight: 500;
      color: #888888;
      text-align: center;
    }
  </style>

    ];

    let currentFilter = 'all';
    let currentSearch = '';
    let selectedConnection = null;

    function renderConnections() {
      const list = document.getElementById('connectionsList');
      list.innerHTML = '';

      let filtered = connections.filter(conn => {
        const matchesFilter = currentFilter === 'all' || conn.type === (currentFilter === 'ai' ? 'ai' : currentFilter === 'qr' ? 'qr' : null) || (currentFilter === 'today' && conn.date === 'today');
        const matchesSearch = currentSearch === '' || conn.searchableText.toLowerCase().includes(currentSearch.toLowerCase());
        return matchesFilter && matchesSearch;
      });

      if (filtered.length === 0) {
        document.getElementById('emptyState').classList.add('show');
        return;
      }

      document.getElementById('emptyState').classList.remove('show');

      let currentDate = null;
      filtered.forEach(conn => {
        const dateLabel = conn.date === 'today' ? 'Today · May 15' : 'Yesterday · May 14';
        if (dateLabel !== currentDate) {
          const label = document.createElement('div');
          label.className = 'section-label';
          label.textContent = dateLabel;
          list.appendChild(label);
          currentDate = dateLabel;
        }

        const card = document.createElement('div');
        card.className = 'connection-card';
        card.dataset.person = conn.person || '';
        card.dataset.type = conn.type;
        card.dataset.name = conn.name;
        card.dataset.role = conn.role;
        card.dataset.avatarBg = conn.avatarBg;
        card.dataset.initials = conn.avatar;

        const borderColor = conn.type === 'ai' && conn.match === '92%' ? '#1B5E20' :
                           conn.type === 'ai' && conn.match === '87%' ? '#4CAF50' :
                           conn.type === 'ai' && conn.match === '81%' ? '#1B5E20' :
                           conn.type === 'qr' && conn.name === 'Amit Verma' ? '#FF6F00' :
                           conn.type === 'qr' && conn.name === 'Sunita Rao' ? '#7B1FA2' :
                           '#1565C0';

        card.style.borderLeftColor = borderColor;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.style.background = conn.avatarBg;
        avatar.textContent = conn.avatar;

        const cardContent = document.createElement('div');
        cardContent.className = 'card-content';

        const name = document.createElement('div');
        name.className = 'card-name';
        name.textContent = conn.name;

        const role = document.createElement('div');
        role.className = 'card-role';
        role.textContent = conn.role;

        const pillsContainer = document.createElement('div');
        pillsContainer.className = 'card-pills';

        const typePill = document.createElement('div');
        typePill.className = `pill ${conn.type === 'ai' ? 'pill-ai' : 'pill-qr'}`;
        typePill.textContent = conn.type === 'ai' ? '🤝 AI Match' : '📷 QR Scan';

        const timePill = document.createElement('div');
        timePill.className = 'pill pill-time';
        timePill.textContent = conn.type === 'ai' ? `Meeting at ${conn.time}` : `Scanned at ${conn.time}`;

        pillsContainer.appendChild(typePill);
        pillsContainer.appendChild(timePill);

        cardContent.appendChild(name);
        cardContent.appendChild(role);
        cardContent.appendChild(pillsContainer);

        const cardRight = document.createElement('div');
        cardRight.className = 'card-right';

        if (conn.type === 'ai') {
          const match = document.createElement('div');
          match.className = 'card-match';
          match.textContent = conn.match;
          const label = document.createElement('div');
          label.className = 'card-match-label';
          label.textContent = 'match';
          cardRight.appendChild(match);
          cardRight.appendChild(label);
        } else {
          const connected = document.createElement('div');
          connected.className = 'card-connected';
          connected.textContent = 'Connected';
          cardRight.appendChild(connected);
        }

        card.appendChild(avatar);
        card.appendChild(cardContent);
        card.appendChild(cardRight);

        card.onclick = () => openModal(conn);
        list.appendChild(card);
      });
    }

    function openModal(conn) {
      selectedConnection = conn;
      document.getElementById('modalAvatar').style.background = conn.avatarBg;
      document.getElementById('modalAvatar').textContent = conn.avatar;
      document.getElementById('modalName').textContent = conn.name;
      document.getElementById('modalRole').textContent = conn.role;

      const buttons = document.getElementById('modalButtons');
      buttons.innerHTML = '';

      const bookBtn = document.createElement(conn.type === 'ai' ? 'a' : 'button');
      bookBtn.className = 'modal-btn modal-btn-primary';
      bookBtn.textContent = '📅 Book Meeting';

      if (conn.type === 'ai' && conn.person) {
        bookBtn.href = `/mobile/m-11-meeting-scheduler.html?person=${conn.person}`;
        bookBtn.onclick = (e) => {
          e.preventDefault();
          history.pushState({}, '', bookBtn.href);
          window.location.href = bookBtn.href;
        };
      } else {
        bookBtn.onclick = () => {
          closeModal();
          showToast('Meeting scheduler coming soon');
        };
      }
      buttons.appendChild(bookBtn);

      const msgBtn = document.createElement('button');
      msgBtn.className = 'modal-btn modal-btn-secondary';
      msgBtn.textContent = '💬 Send Message';
      msgBtn.onclick = () => {
        closeModal();
        showToast('Messaging coming soon');
      };
      buttons.appendChild(msgBtn);

      if (conn.type === 'ai' && conn.person) {
        const profileBtn = document.createElement('a');
        profileBtn.className = 'modal-btn modal-btn-tertiary';
        profileBtn.textContent = '👤 View Profile';
        profileBtn.href = `/mobile/m-10-match-profile.html?person=${conn.person}`;
        profileBtn.onclick = (e) => {
          e.preventDefault();
          history.pushState({}, '', profileBtn.href);
          window.location.href = profileBtn.href;
        };
        buttons.appendChild(profileBtn);
      }

      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('modalSheet').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('modalSheet').classList.remove('open');
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
      event.target.classList.add('active');
      renderConnections();
    }

    function filterConnections() {
      currentSearch = document.getElementById('searchInput').value;
      renderConnections();
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      const screen = document.querySelector('.screen');
      screen.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function goDirectory(event) {
      event.preventDefault();
      window.location.href = '/';
    }

    function goBack(event) {
      event.preventDefault();
      window.history.back();
    }

    function navClick(event) {
      const href = event.currentTarget.getAttribute('href');
      if (href === '#') {
        event.preventDefault();
        showToast('Coming soon');
      } else {
        event.preventDefault();
        history.pushState({}, '', href);
        window.location.href = href;
      }
    }

    window.addEventListener('popstate', () => {
      renderConnections();
    });

    renderConnections();
  </script>
</body>
