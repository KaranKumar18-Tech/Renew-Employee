<html lang="en">
<head>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #F2F2F2; font-family: 'Inter', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 48px 24px;
}
.page-title { font-size: 18px; font-weight: 600; color: #1A1A1A; text-align: center; margin-bottom: 32px; }

/* ── iPhone Shell ── */
.iphone {
  width: 320px; height: 694px; border-radius: 55px;
  background: #000; position: relative; overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.25), inset 0 0 0 2px #1c1c1c;
}
.notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 0 0 18px 18px; z-index: 100; }
.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 100px; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.18); z-index: 100; }

/* ── Status Bar ── */
.status-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 44px; z-index: 90;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 22px 0; font-size: 12px; font-weight: 600; color: #FFFFFF;
  pointer-events: none;
}
.sb-right { display: flex; align-items: center; gap: 5px; }
.sb-right svg { width: 16px; height: 16px; }

/* ── Screen ── */
.screen { position: absolute; inset: 0; border-radius: 55px; overflow: hidden; display: flex; flex-direction: column; background: #F5F9F5; }
.screen-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.screen-scroll::-webkit-scrollbar { display: none; }

/* ── Top Nav ── */
.top-nav {
  background: #1B5E20; padding: 56px 16px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.back-pill {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px; padding: 4px 8px 4px 4px;
  text-decoration: none; flex-shrink: 0;
}
.back-pill:hover { background: rgba(255,255,255,0.25); }
.back-pill-text { font-size: 13px; font-weight: 600; color: #FFFFFF; }
.nav-center-text { font-size: 16px; font-weight: 600; color: #FFFFFF; }
.match-badge-nav {
  background: #4CAF50; border-radius: 20px; padding: 4px 10px;
  font-size: 11px; font-weight: 700; color: #FFFFFF; white-space: nowrap; flex-shrink: 0;
}

/* ── Hero Section ── */
.hero { background: #1B5E20; padding: 16px 16px 28px; text-align: center; }
.hero-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: #FFFFFF; border: 3px solid #4CAF50;
  box-shadow: 0 0 0 4px rgba(76,175,80,0.25);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto;
  font-size: 26px; font-weight: 700; color: #1B5E20;
}
.hero-meta-row { display: flex; align-items: center; justify-content: center; gap: 16px; }
.hero-focus-row { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }

/* ── Main Content ── */
.main-content { background: #F5F9F5; border-radius: 20px 20px 0 0; margin-top: -12px; padding: 16px 16px 100px; }

/* ── Section label ── */
.sec-label { font-size: 13px; font-weight: 600; color: #1A1A1A; margin-bottom: 8px; }

/* ── Match reason card ── */
.match-reason-card {
  background: #FFFFFF; border-radius: 14px; padding: 14px;
  border-left: 4px solid #4CAF50; margin-bottom: 14px;
}

/* ── Shared interest pills ── */
.pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
.interest-pill {
  background: #E8F5E9; border: 1px solid #C8E6C9; border-radius: 20px;
  padding: 5px 12px; font-size: 11px; font-weight: 600; color: #1B5E20;
  white-space: nowrap;
}

/* ── Focus items ── */
.focus-pill {
  background: #FFFFFF; border: 1px solid #C8E6C9; border-radius: 10px;
  padding: 8px 12px; display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 500; color: #1A1A1A; margin-bottom: 6px;
}
.focus-pill:last-child { margin-bottom: 0; }

/* ── Event goal card ── */
.goal-card {
  background: #F5F9F5; border-radius: 10px; padding: 12px;
  border: 1px solid #C8E6C9;
  font-size: 12px; font-weight: 400; color: #616161;
  line-height: 1.5; font-style: italic;
}

/* ── Availability slots ── */
.slot-row { display: flex; flex-direction: column; gap: 6px; }
.slot-pill {
  background: #E8F5E9; border-radius: 10px; padding: 8px 14px;
  font-size: 12px; font-weight: 500; color: #1B5E20;
  border: 1px solid #C8E6C9;
  display: inline-flex; align-items: center; gap: 6px;
}

/* ── Section spacer ── */
.sec { margin-top: 14px; }

/* ── CTA Bar ── */
.cta-bar {
  position: absolute; bottom: 52px; left: 0; right: 0;
  background: #FFFFFF; border-top: 1px solid #E0E0E0;
  padding: 12px 16px; display: flex; gap: 10px; z-index: 50;
}
.btn-outline-cta {
  flex: 1; height: 46px; background: #FFFFFF;
  border: 1.5px solid #1B5E20; border-radius: 10px;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  color: #1B5E20; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: background 0.15s;
}
.btn-outline-cta:hover { background: #E8F5E9; }
.btn-primary-cta {
  flex: 1; height: 46px; background: #1B5E20;
  border: none; border-radius: 10px;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  color: #FFFFFF; cursor: pointer; text-decoration: none;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.btn-primary-cta:hover { background: #2E7D32; }

/* ── Bottom Nav ── */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: #FFFFFF; border-top: 1px solid #E0E0E0;
  padding: 8px 0 20px; display: flex; justify-content: space-around;
  z-index: 60;
}
.nav-tab { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; flex: 1; text-decoration: none; }
.nav-icon { font-size: 18px; line-height: 1; }
.nav-lbl { font-size: 10px; font-weight: 400; color: #9E9E9E; }
.nav-tab.active .nav-lbl { font-weight: 600; color: #1B5E20; }

/* ── Toast ── */
.toast {
  position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
  background: #1A1A1A; color: #FFFFFF; font-size: 12px; font-weight: 500;
  font-family: 'Inter', sans-serif; border-radius: 8px; padding: 8px 16px;
  white-space: nowrap; z-index: 200; pointer-events: none;
  opacity: 0; transition: opacity 0.2s;
}
.toast.show { opacity: 1; }

/* ── Frame label ── */
.frame-label { margin-top: 16px; font-size: 13px; font-weight: 500; color: #888888; text-align: center; }
</style>
</head>

<script>
const persons = {
  priya: {
    initials: 'PS', avatarBg: '#1B5E20',
    name: 'Priya Sharma', role: 'Senior Manager — People & Culture',
    company: '🏢 ReNew Power', city: '📍 Mumbai',
    experience: '👥 12 yrs experience', focus: '🎯 People Strategy',
    matchPct: '92% Match',
    matchReason: 'Priya and you both share a focus on cross-functional leadership, team-building, and innovation at ReNew. She\'s also exploring AI applications in HR — aligning with your Technology interest.',
    interests: ['People Strategy','Innovation','Leadership','AI & Technology'],
    about: 'Priya leads the People & Culture vertical at ReNew, focusing on high-performance team design, leadership development, and HR digital transformation. She is currently piloting an AI-driven performance management system across 3 business units.',
    workingOn: ['🤖 AI in HR Processes','📊 Performance Analytics','🌱 Leadership Pipeline'],
    goal: '"Looking to connect with peers from Technology and Strategy teams to explore how AI can accelerate people decisions at ReNew."',
    slots: ['🕙 Today · 11:00 AM · Hub 1','🕑 Today · 2:30 PM · Hub 2']
  },
  rohan: {
    initials: 'RK', avatarBg: '#4CAF50',
    name: 'Rohan Kapoor', role: 'Lead Engineer — Technology',
    company: '🏢 ReNew Power', city: '📍 Gurugram',
    experience: '👥 8 yrs experience', focus: '🎯 AI & Technology',
    matchPct: '87% Match',
    matchReason: 'Rohan and you are both exploring AI applications in renewable energy operations. He leads tech innovation at ReNew\'s largest wind farm cluster — directly aligned with your Innovation and AI interests.',
    interests: ['AI & Technology','Innovation','Green Hydrogen','Operations'],
    about: 'Rohan leads engineering and tech innovation for ReNew\'s wind energy division. He is currently building an ML-based predictive maintenance system for turbine fleets across Rajasthan and Gujarat.',
    workingOn: ['⚡ Predictive Maintenance ML','🌬️ Wind Farm Optimization','🤖 AI Operations Stack'],
    goal: '"Looking to connect with Strategy and Business peers to understand how technology can drive faster commercial decisions at ReNew."',
    slots: ['🕙 Today · 10:30 AM · Hub 2','🕓 Today · 3:30 PM · Hub 3']
  },
  neha: {
    initials: 'NJ', avatarBg: '#FF6F00',
    name: 'Neha Joshi', role: 'Business Analyst — Strategy',
    company: '🏢 ReNew Power', city: '📍 Hyderabad',
    experience: '👥 5 yrs experience', focus: '🎯 Energy Transition',
    matchPct: '81% Match',
    matchReason: 'Neha and you are both working on data-driven strategy and digital transformation at ReNew. Her analytical background in energy transition projects directly complements your strategic interests.',
    interests: ['Energy Transition','AI & Technology','Finance & Risk','Policy & Regulation'],
    about: 'Neha works in ReNew\'s corporate strategy team, specializing in energy transition analytics and market entry modelling. She has led feasibility studies for 4 new state markets in FY2025-26.',
    workingOn: ['📊 Energy Market Analytics','🌍 State Market Expansion','📋 Policy Impact Modelling'],
    goal: '"Looking to connect with Technology and Operations peers to build data pipelines that support faster strategic decisions."',
    slots: ['🕛 Today · 12:00 PM · Hub 1','🕑 Today · 2:00 PM · Hub 3']
  }
};

// Read param and render
const key = new URLSearchParams(window.location.search).get('person') || 'priya';
const p = persons[key] || persons.priya;

// Avatar
const av = document.getElementById('d-avatar');
av.textContent = p.initials;
av.style.background = p.avatarBg;

// Nav badge + hero text
document.getElementById('d-match-badge').textContent = p.matchPct;
document.getElementById('d-name').textContent = p.name;
document.getElementById('d-role').textContent = p.role;
document.getElementById('d-company').textContent = p.company;
document.getElementById('d-city').textContent = p.city;
document.getElementById('d-exp').textContent = p.experience;
document.getElementById('d-focus').textContent = p.focus;
document.getElementById('d-reason').textContent = p.matchReason;
document.getElementById('d-about').textContent = p.about;
document.getElementById('d-goal').textContent = p.goal;
document.getElementById('d-goal-label').textContent = 'Their goal at Leaders Connect';

// Interest pills
const iWrap = document.getElementById('d-interests');
p.interests.forEach(i => {
  const s = document.createElement('span');
  s.className = 'interest-pill';
  s.textContent = i;
  iWrap.appendChild(s);
});

// Working on pills
const wWrap = document.getElementById('d-working');
p.workingOn.forEach(w => {
  const d = document.createElement('div');
  d.className = 'focus-pill';
  d.textContent = w;
  wWrap.appendChild(d);
});

// Availability slots
const sWrap = document.getElementById('d-slots');
p.slots.forEach(s => {
  const sp = document.createElement('span');
  sp.className = 'slot-pill';
  sp.textContent = s;
  sWrap.appendChild(sp);
});

// Book Meeting CTA
document.getElementById('d-book-btn').href = '/mobile/m-11-meeting-scheduler.html?person=' + key;

// Toasts
let toastTimer = null;
function fireToast(msg) {
  const t = document.getElementById('mainToast');
  t.textContent = msg;
  if (toastTimer) clearTimeout(toastTimer);
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
function showToast()    { fireToast('Messaging coming soon'); }
function showNavToast() { fireToast('Coming soon'); }

history.pushState(null, null, window.location.href);
window.addEventListener('popstate', function() { window.history.back(); });
</script>
